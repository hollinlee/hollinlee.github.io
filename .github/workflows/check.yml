name: Check website

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check anonymous example
        env:
          CONTENT_REPO_URL: ""
        run: npm run check

      - name: Build anonymous example
        env:
          CONTENT_REPO_URL: ""
        run: npm run build
